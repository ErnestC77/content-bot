services:
  - type: web
    name: content-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: content-bot-db
          property: connectionString
      - key: BOT_MODE
        value: webhook
      - key: WEBHOOK_URL
        sync: false
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: BOT_TOKEN
        sync: false
      - key: OWNER_TELEGRAM_ID
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_BASE_URL
        value: https://api.aitunnel.ru
      - key: AI_PROVIDER
        value: anthropic
      - key: AI_MODEL
        value: claude-sonnet-5
      - key: DEFAULT_CHANNEL_ID
        sync: false
      - key: TIMEZONE
        value: Europe/Moscow
      - key: DAILY_CHECK_TIME
        value: "10:00"

databases:
  - name: content-bot-db
    databaseName: content_bot
    plan: basic-256mb
