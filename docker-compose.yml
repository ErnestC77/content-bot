services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: content_bot
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # $$POSTGRES_USER — переменная окружения контейнера db (Compose экранирование $$),
      # чтобы healthcheck не был захардкожен на конкретного пользователя postgres/content_bot
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    # без restart контейнеры не поднимались обратно после перезагрузки VDS
    # (штатный ребут хоста -> SIGTERM -> exit 0 -> без политики так и остаются
    # выключенными) — отсюда был 502 у nginx, пока контейнеры не подняли вручную
    restart: unless-stopped
    # DATABASE_URL берётся ТОЛЬКО из .env — раньше здесь был захардкожен
    # postgres:postgres, который перебивал .env (explicit environment: приоритетнее
    # env_file:) и ломал подключение при других учётных данных БД (напр. на VDS-деплое).
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
