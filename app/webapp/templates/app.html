<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Контент-панель</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #ffffff);
    --text: var(--tg-theme-text-color, #1c1e21);
    --hint: var(--tg-theme-hint-color, #8a8a8e);
    --card: var(--tg-theme-secondary-bg-color, #f2f2f7);
    --btn: var(--tg-theme-button-color, #2b6cb0);
    --btn-text: var(--tg-theme-button-text-color, #ffffff);
    --link: var(--tg-theme-link-color, #2b6cb0);
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, Segoe UI, Roboto, sans-serif;
         background: var(--bg); color: var(--text); font-size: 15px; padding-bottom: 80px; }
  header { padding: 12px 16px; font-weight: 700; font-size: 18px; }
  .tabs { display: flex; position: sticky; top: 0; background: var(--bg); z-index: 5;
          border-bottom: 1px solid var(--card); }
  .tabs button { flex: 1; padding: 12px 4px; background: none; border: none; color: var(--hint);
                 font-size: 13px; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; }
  .tabs button.active { color: var(--text); border-bottom-color: var(--btn); }
  main { padding: 12px 16px; }
  .card { background: var(--card); border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; }
  .card .top { display: flex; justify-content: space-between; gap: 8px; }
  .topic { font-weight: 600; }
  .meta { color: var(--hint); font-size: 13px; margin-top: 2px; }
  .status { display: inline-block; font-size: 12px; margin-top: 6px; }
  .preview { font-size: 13px; color: var(--text); margin-top: 8px; white-space: pre-wrap;
             max-height: 8em; overflow: auto; opacity: .85; }
  .actions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  button.act { border: none; border-radius: 8px; padding: 8px 10px; font-size: 13px; cursor: pointer;
               background: var(--btn); color: var(--btn-text); }
  button.act.sec { background: transparent; color: var(--link); border: 1px solid var(--hint); }
  button.act.danger { background: #c53030; color: #fff; }
  textarea, input, select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--hint);
            background: var(--bg); color: var(--text); font-size: 14px; font-family: inherit; margin-top: 6px; }
  label { font-size: 13px; color: var(--hint); display: block; margin-top: 10px; }
  .primary { width: 100%; padding: 13px; border: none; border-radius: 10px; background: var(--btn);
             color: var(--btn-text); font-size: 15px; font-weight: 600; margin-top: 14px; cursor: pointer; }
  .empty { color: var(--hint); text-align: center; padding: 24px; }
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: none;
              align-items: center; justify-content: center; z-index: 20; padding: 16px; }
  .modal { background: var(--bg); border-radius: 12px; padding: 16px; width: 100%; max-width: 440px; }
  .hidden { display: none; }
</style>
</head>
<body>
<header>🗂 Контент-панель</header>
<div class="tabs">
  <button data-tab="drafts" class="active">📝 Драфты</button>
  <button data-tab="ready">📢 Готовые</button>
  <button data-tab="add">➕ Добавить</button>
  <button data-tab="settings">⚙️ Настройки</button>
</div>
<main>
  <div id="tab-drafts"></div>
  <div id="tab-ready" class="hidden"></div>
  <div id="tab-add" class="hidden">
    <label>Список постов (по одному на строку): <code>ГГГГ-ММ-ДД [ЧЧ:ММ] — тема</code></label>
    <textarea id="bulk" rows="8" placeholder="2026-07-05 — Как выбрать велосипед&#10;2026-07-06 10:00 — Разбор ошибок"></textarea>
    <button class="primary" id="bulk-submit">Создать посты</button>
    <div id="bulk-result" class="meta"></div>
  </div>
  <div id="tab-settings" class="hidden"></div>
</main>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div id="modal-title" style="font-weight:600;margin-bottom:8px"></div>
    <div id="modal-body"></div>
    <div class="actions" style="justify-content:flex-end;margin-top:14px">
      <button class="act sec" onclick="closeModal()">Отмена</button>
      <button class="act" id="modal-ok">ОК</button>
    </div>
  </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();
const INIT = tg.initData || "";

async function api(path, method = "GET", body = null) {
  const res = await fetch("/api/webapp" + path, {
    method,
    headers: { "Content-Type": "application/json", "X-Telegram-Init-Data": INIT },
    body: body ? JSON.stringify(body) : null,
  });
  if (!res.ok) { tg.showAlert("Ошибка: " + res.status); throw new Error(res.status); }
  return res.json();
}

// ---- модалка ----
function openModal(title, bodyHtml, onOk) {
  document.getElementById("modal-title").textContent = title;
  document.getElementById("modal-body").innerHTML = bodyHtml;
  const ok = document.getElementById("modal-ok");
  ok.onclick = async () => { await onOk(); closeModal(); };
  document.getElementById("modal-bg").style.display = "flex";
}
function closeModal() { document.getElementById("modal-bg").style.display = "none"; }

// ---- вкладки ----
document.querySelectorAll(".tabs button").forEach(b => {
  b.onclick = () => {
    document.querySelectorAll(".tabs button").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    ["drafts","ready","add","settings"].forEach(t =>
      document.getElementById("tab-" + t).classList.toggle("hidden", t !== b.dataset.tab));
    if (b.dataset.tab === "settings") loadSettings();
  };
});

function esc(s) { return (s||"").replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function taskCard(t, kind) {
  let actions = "";
  if (t.can_approve) {
    actions = `
      <button class="act" onclick="doApprove(${t.id})">✅ Одобрить</button>
      <button class="act sec" onclick="doRevise(${t.id})">✏️ Правки</button>
      <button class="act sec" onclick="doAlt(${t.id})">🔄 Вариант</button>
      <button class="act danger" onclick="doCancel(${t.id})">❌ Отмена</button>`;
  } else if (t.can_generate) {
    actions = `<button class="act" onclick="doGenerate(${t.id})">⚙️ Сгенерировать</button>
               <button class="act sec" onclick="doEdit(${t.id})">✎ Изменить</button>
               <button class="act danger" onclick="doDelete(${t.id})">🗑</button>`;
  }
  if (t.can_publish) {
    actions += `<button class="act" onclick="doPublishNow(${t.id})">📢 Опубликовать сейчас</button>`;
  }
  const preview = t.preview ? `<div class="preview">${esc(t.preview)}</div>` : "";
  return `<div class="card">
    <div class="top"><div><div class="topic">${esc(t.topic) || "(без темы)"}</div>
      <div class="meta">#${t.id} · ${t.publish_date} ${t.publish_time||""} ${t.media_count?("· 📎"+t.media_count):""}</div></div></div>
    <div class="status">${esc(t.status_label)}</div>
    ${preview}
    <div class="actions">${actions}</div>
  </div>`;
}

async function loadTasks() {
  const data = await api("/tasks");
  const d = document.getElementById("tab-drafts");
  const r = document.getElementById("tab-ready");
  d.innerHTML = data.drafts.length ? data.drafts.map(t => taskCard(t,"draft")).join("") : '<div class="empty">Черновиков нет</div>';
  r.innerHTML = data.ready.length ? data.ready.map(t => taskCard(t,"ready")).join("") : '<div class="empty">Готовых постов нет</div>';
}

async function doApprove(id){ const res = await api(`/tasks/${id}/approve`,"POST"); tg.showAlert(res.message||"Одобрено"); loadTasks(); }
async function doAlt(id){ await api(`/tasks/${id}/alternative`,"POST"); tg.showAlert("Готовлю другой вариант — придёт в чат."); loadTasks(); }
async function doGenerate(id){ const res = await api(`/tasks/${id}/generate`,"POST"); tg.showAlert(res.ok?"Черновик готовится — придёт в чат.":"Не удалось (AI?)"); loadTasks(); }
function doPublishNow(id){ tg.showConfirm("Опубликовать в канал сейчас?", async ok => { if(ok){ const res = await api(`/tasks/${id}/publish_now`,"POST"); tg.showAlert(res.message||"Готово"); loadTasks(); } }); }
async function doCancel(id){ tg.showConfirm("Отменить задачу?", async ok => { if(ok){ await api(`/tasks/${id}/cancel`,"POST"); loadTasks(); } }); }
async function doDelete(id){ tg.showConfirm("Удалить задачу?", async ok => { if(ok){ await api(`/tasks/${id}/delete`,"POST"); loadTasks(); } }); }

function doRevise(id){
  openModal("Что изменить?", '<textarea id="rev" rows="4" placeholder="Опишите правки"></textarea>',
    async () => { const c = document.getElementById("rev").value.trim();
      if(!c) return; await api(`/tasks/${id}/revise`,"POST",{comment:c});
      tg.showAlert("Новая версия готовится — придёт в чат."); loadTasks(); });
}

async function doEdit(id){
  const t = await api(`/tasks/${id}`);
  openModal("Изменить задачу", `
    <label>Дата</label><input id="e-date" type="date" value="${t.publish_date}">
    <label>Время</label><input id="e-time" type="time" value="${t.publish_time}">
    <label>Тема</label><input id="e-topic" value="${esc(t.topic)}">
    <label>Цель</label><input id="e-goal" value="${esc(t.goal)}">
    <label>Описание</label><textarea id="e-desc" rows="2">${esc(t.description)}</textarea>`,
    async () => {
      await api(`/tasks/${id}/edit`,"POST",{
        publish_date: document.getElementById("e-date").value,
        publish_time: document.getElementById("e-time").value,
        topic: document.getElementById("e-topic").value,
        goal: document.getElementById("e-goal").value,
        description: document.getElementById("e-desc").value,
      });
      loadTasks();
    });
}

document.getElementById("bulk-submit").onclick = async () => {
  const text = document.getElementById("bulk").value;
  if(!text.trim()) return;
  const res = await api("/tasks/bulk","POST",{text});
  let msg = "Создано: " + res.created;
  if(res.errors && res.errors.length) msg += "\nНе разобрано: " + res.errors.length;
  document.getElementById("bulk-result").textContent = msg;
  document.getElementById("bulk").value = "";
  loadTasks();
};

async function loadSettings() {
  const s = await api("/settings");
  document.getElementById("tab-settings").innerHTML = `
    <label>ID канала</label><input id="s-channel" value="${esc(s.channel_id)}">
    <label>Готовить черновик за (дней)</label><input id="s-lead" type="number" min="0" value="${esc(s.draft_lead_days)}">
    <label>Время публикации по умолчанию</label><input id="s-ptime" value="${esc(s.default_publish_time)}">
    <label>Время ежедневной проверки</label><input id="s-check" value="${esc(s.daily_check_time)}">
    <label>AI-провайдер</label><input id="s-prov" value="${esc(s.ai_provider)}">
    <label>AI-модель</label><input id="s-model" value="${esc(s.ai_model)}">
    <label>Системный промт</label><textarea id="s-prompt" rows="10">${esc(s.system_prompt)}</textarea>
    <button class="primary" id="s-save">Сохранить</button>`;
  document.getElementById("s-save").onclick = async () => {
    await api("/settings","POST",{
      channel_id: document.getElementById("s-channel").value,
      draft_lead_days: document.getElementById("s-lead").value,
      default_publish_time: document.getElementById("s-ptime").value,
      daily_check_time: document.getElementById("s-check").value,
      ai_provider: document.getElementById("s-prov").value,
      ai_model: document.getElementById("s-model").value,
      system_prompt: document.getElementById("s-prompt").value,
    });
    tg.showAlert("Сохранено");
  };
}

loadTasks();
</script>
</body>
</html>
