<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Контент-панель</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #ffffff);
    --text: var(--tg-theme-text-color, #1c1e21);
    --hint: var(--tg-theme-hint-color, #8a8a8e);
    --card: var(--tg-theme-secondary-bg-color, #f2f2f7);
    --btn: var(--tg-theme-button-color, #2b6cb0);
    --btn-text: var(--tg-theme-button-text-color, #ffffff);
    --link: var(--tg-theme-link-color, #2b6cb0);
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, Segoe UI, Roboto, sans-serif;
         background: var(--bg); color: var(--text); font-size: 15px; padding-bottom: 80px; }
  header { padding: 12px 16px; font-weight: 700; font-size: 18px; }
  .tabs { display: flex; position: sticky; top: 0; background: var(--bg); z-index: 5;
          border-bottom: 1px solid var(--card); }
  .tabs button { flex: 1; padding: 12px 4px; background: none; border: none; color: var(--hint);
                 font-size: 13px; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; }
  .tabs button.active { color: var(--text); border-bottom-color: var(--btn); }
  main { padding: 12px 16px; }
  .card { background: var(--card); border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; }
  .card .top { display: flex; justify-content: space-between; gap: 8px; }
  .topic { font-weight: 600; }
  .meta { color: var(--hint); font-size: 13px; margin-top: 2px; }
  .status { display: inline-block; font-size: 12px; margin-top: 6px; }
  .preview { font-size: 14px; color: var(--text); margin-top: 8px; white-space: pre-wrap;
             line-height: 1.4; max-height: 320px; overflow: auto;
             background: var(--bg); border-radius: 8px; padding: 10px; }
  .quote-lines { font-size: 14px; margin-top: 8px; line-height: 1.5; max-height: 320px; overflow: auto;
                 background: var(--bg); border-radius: 8px; padding: 10px; }
  .quote-line { padding: 2px 6px; border-radius: 4px; cursor: pointer; white-space: pre-wrap; }
  .quote-line.empty { cursor: default; }
  .quote-line.selected { background: var(--btn); color: var(--btn-text); }
  .media-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .chip { font-size: 12px; background: var(--bg); border: 1px solid var(--hint); border-radius: 14px;
          padding: 4px 8px; display: flex; align-items: center; gap: 6px; }
  .chip b { cursor: pointer; color: #c53030; }
  .addmedia { margin-top: 8px; }
  .addmedia label { display: inline-block; font-size: 13px; color: var(--link);
                    border: 1px dashed var(--hint); border-radius: 8px; padding: 8px 10px; cursor: pointer; margin: 0; }
  .addmedia input { display: none; }
  .actions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  button.act { border: none; border-radius: 8px; padding: 9px 12px; font-size: 14px; cursor: pointer;
               background: var(--btn); color: var(--btn-text); }
  button.act:disabled { opacity: .5; }
  button.act.sec { background: transparent; color: var(--link); border: 1px solid var(--hint); }
  button.act.danger { background: #c53030; color: #fff; }
  #toast { position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%);
           background: rgba(0,0,0,.85); color: #fff; padding: 10px 16px; border-radius: 10px;
           font-size: 14px; z-index: 40; opacity: 0; transition: opacity .2s; pointer-events: none; max-width: 90%; }
  #toast.show { opacity: 1; }
  textarea, input, select { width: 100%; max-width: 100%; min-width: 0; padding: 10px; border-radius: 8px;
            border: 1px solid var(--hint); background: var(--bg); color: var(--text); font-size: 16px;
            font-family: inherit; margin-top: 6px; display: block; }
  input[type="date"], input[type="time"] { -webkit-appearance: none; appearance: none; }
  label { font-size: 13px; color: var(--hint); display: block; margin-top: 10px; }
  .primary { width: 100%; padding: 13px; border: none; border-radius: 10px; background: var(--btn);
             color: var(--btn-text); font-size: 15px; font-weight: 600; margin-top: 14px; cursor: pointer; }
  .empty { color: var(--hint); text-align: center; padding: 24px; }
  .cal-title { font-weight: 600; margin: 4px 0 8px; text-align: center; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 14px; }
  .cal-dow { font-size: 10px; color: var(--hint); text-align: center; padding: 2px 0; }
  .cal-cell { min-height: 50px; background: var(--card); border-radius: 6px; padding: 2px; overflow: hidden; }
  .cal-cell.empty { background: transparent; min-height: 0; }
  .cal-cell.today { outline: 2px solid var(--btn); }
  .cal-day { font-size: 10px; color: var(--hint); }
  .cal-item { font-size: 10px; line-height: 1.25; background: var(--btn); color: var(--btn-text);
              border-radius: 4px; padding: 1px 3px; margin-top: 2px; white-space: nowrap;
              overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
  .cal-item.done { background: var(--hint); }
  .section-h { font-weight: 600; margin: 6px 0; font-size: 14px; color: var(--hint); }
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: none;
              align-items: center; justify-content: center; z-index: 20; padding: 16px; }
  .modal { background: var(--bg); border-radius: 12px; padding: 16px; width: 100%; max-width: 440px;
           max-height: 90vh; overflow-y: auto; overflow-x: hidden; }
  .hidden { display: none; }
</style>
</head>
<body>
<header>🗂 Контент-панель <span id="refresh" style="float:right;cursor:pointer">⟳</span></header>
<div class="tabs">
  <button data-tab="drafts" class="active">📝 Драфты</button>
  <button data-tab="ready">📢 Готовые</button>
  <button data-tab="add">➕ Добавить</button>
  <button data-tab="settings">⚙️ Настройки</button>
</div>
<main>
  <div id="tab-drafts"></div>
  <div id="tab-ready" class="hidden"></div>
  <div id="tab-add" class="hidden">
    <label>Список постов (по одному на строку): <code>ДД-ММ-ГГГГ [ЧЧ:ММ] — тема</code></label>
    <p style="color:var(--hint);font-size:13px;margin:4px 0 0">
      Указанные дата и время — это когда бот подготовит <b>черновик</b> (задаст вопросы
      и сгенерирует пост). Дата публикации в канал вычислится автоматически
      (черновик + лид-тайм из настроек) и её можно поменять отдельно в карточке поста.
    </p>
    <textarea id="bulk" rows="8" placeholder="05-07-2026 — Как выбрать велосипед&#10;06-07-2026 10:00 — Разбор ошибок"></textarea>
    <button class="primary" id="bulk-submit">Создать посты</button>
    <div id="bulk-result" class="meta"></div>
  </div>
  <div id="tab-settings" class="hidden"></div>
</main>
<div id="toast"></div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div id="modal-title" style="font-weight:600;margin-bottom:8px"></div>
    <div id="modal-body"></div>
    <div class="actions" style="justify-content:flex-end;margin-top:14px">
      <button class="act sec" id="modal-cancel" onclick="closeModal()">Отмена</button>
      <button class="act" id="modal-ok">ОК</button>
    </div>
  </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();
const INIT = tg.initData || "";

async function api(path, method = "GET", body = null) {
  let url = "/api/webapp" + path;
  if (method === "GET") url += (url.includes("?") ? "&" : "?") + "_=" + Date.now();
  const res = await fetch(url, {
    method,
    cache: "no-store",
    headers: { "Content-Type": "application/json", "X-Telegram-Init-Data": INIT },
    body: body ? JSON.stringify(body) : null,
  });
  if (!res.ok) { tg.showAlert("Ошибка: " + res.status); throw new Error(res.status); }
  return res.json();
}

// ---- модалка ----
function openModal(title, bodyHtml, onOk, opts) {
  opts = opts || {};
  document.getElementById("modal-title").textContent = title;
  document.getElementById("modal-body").innerHTML = bodyHtml;
  const ok = document.getElementById("modal-ok");
  ok.textContent = opts.okLabel || "ОК";
  ok.onclick = async () => { await onOk(); closeModal(); };
  document.getElementById("modal-cancel").textContent = opts.cancelLabel || "Отмена";
  document.getElementById("modal-bg").style.display = "flex";
}
function closeModal() { document.getElementById("modal-bg").style.display = "none"; }

// ---- вкладки ----
document.querySelectorAll(".tabs button").forEach(b => {
  b.onclick = () => {
    document.querySelectorAll(".tabs button").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    ["drafts","ready","add","settings"].forEach(t =>
      document.getElementById("tab-" + t).classList.toggle("hidden", t !== b.dataset.tab));
    if (b.dataset.tab === "settings") loadSettings();
  };
});

function esc(s) { return (s||"").replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function fmtDate(iso) { if(!iso) return ""; const p=iso.split("-"); return p.length===3 ? `${p[2]}-${p[1]}-${p[0]}` : iso; }

const MONTHS = ["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
function monthCalendar(tasks, dateField) {
  dateField = dateField || "publish_date";
  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth();
  const startDow = (new Date(year, month, 1).getDay() + 6) % 7; // Пн=0
  const days = new Date(year, month + 1, 0).getDate();
  const todayIso = `${year}-${String(month+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}`;
  const byDay = {};
  tasks.forEach(t => { const d = t[dateField] || t.publish_date; (byDay[d] = byDay[d] || []).push(t); });
  let html = `<div class="cal-title">${MONTHS[month]} ${year}</div><div class="cal-grid">`;
  ["Пн","Вт","Ср","Чт","Пт","Сб","Вс"].forEach(d => html += `<div class="cal-dow">${d}</div>`);
  for (let i = 0; i < startDow; i++) html += `<div class="cal-cell empty"></div>`;
  for (let day = 1; day <= days; day++) {
    const iso = `${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    const items = (byDay[iso] || []).map(t =>
      `<div class="cal-item ${t.status==='published'?'done':''}" onclick="doEdit(${t.id})">${esc((t.topic||"—").slice(0,20))}</div>`
    ).join("");
    html += `<div class="cal-cell ${iso===todayIso?'today':''}"><div class="cal-day">${day}</div>${items}</div>`;
  }
  return html + `</div>`;
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg; el.classList.add("show");
  clearTimeout(toastTimer); toastTimer = setTimeout(() => el.classList.remove("show"), 2500);
}
// Мгновенно блокирует нажатую кнопку и выполняет действие
async function run(btn, fn) {
  if (btn) { btn.disabled = true; btn.dataset.t = btn.textContent; btn.textContent = "…"; }
  try { await fn(); }
  finally { if (btn) { btn.disabled = false; btn.textContent = btn.dataset.t; } }
}

function mediaChips(t) {
  const canEdit = t.can_approve || t.can_generate;
  let chips = t.media.map(m =>
    `<span class="chip">${m.type === 'video' ? '🎬' : m.type === 'photo' ? '🖼' : '📄'}${canEdit ? ` <b onclick="delMedia(${t.id},${m.id})">✕</b>` : ''}</span>`
  ).join("");
  if (canEdit) {
    chips += `<span class="addmedia"><label>➕ фото/видео
      <input type="file" accept="image/*,video/*" onchange="uploadMedia(${t.id}, this)"></label></span>`;
  }
  return `<div class="media-chips">${chips}</div>`;
}

function questionsBlock(t) {
  if (!t.can_answer) return "";
  const inputs = t.questions.map((q, i) =>
    `<label>${esc(q)}</label><textarea rows="2" data-qidx="${i}" placeholder="Ваш ответ (можно пропустить)"></textarea>`
  ).join("");
  return `<div style="margin-top:10px">${inputs}
    <div class="actions">
      <button class="act" onclick="doSubmitAnswers(${t.id}, this)">✅ Ответить и сгенерировать</button>
      <button class="act sec" onclick="doSkipAnswers(${t.id}, this)">⏭ Пропустить</button>
      <button class="act sec" onclick="doEdit(${t.id})">◀ Назад: изменить тему/цель</button>
    </div>
  </div>`;
}

function canEditQuote(t) { return !["published", "cancelled", "publishing"].includes(t.status); }

// taskId -> Set<lineIndex>; переживает перерисовки loadTasks(), пока страница открыта
const quoteSelection = {};

function postText(t) {
  if (!t.text) return "";
  if (!canEditQuote(t)) return `<div class="preview">${esc(t.text)}</div>`;
  const lines = t.text.split("\n");
  // тап по строке вместо drag-выделения — на тачскрине в WebView Telegram
  // выделение мышью/пальцем через переносы строк ненадёжно сбрасывается
  if (!quoteSelection[t.id]) {
    const saved = t.quote_text ? t.quote_text.split("\n") : [];
    quoteSelection[t.id] = new Set(lines.map((l, i) => i).filter(i => saved.includes(lines[i])));
  }
  const sel = quoteSelection[t.id];
  const rendered = lines.map((line, i) => {
    if (!line.trim()) return `<div class="quote-line empty">&nbsp;</div>`;
    const cls = sel.has(i) ? "quote-line selected" : "quote-line";
    return `<div class="${cls}" data-i="${i}" onclick="toggleQuoteLine(${t.id}, ${i})">${esc(line)}</div>`;
  }).join("");
  return `<div class="quote-lines" id="qlines-${t.id}">${rendered}</div>
    <div class="actions" style="margin-top:6px">
      <button class="act sec" onclick="doMarkSelection(${t.id})">🔖 Сохранить выбранные строки как цитату</button>
    </div>`;
}

function toggleQuoteLine(id, i) {
  const sel = quoteSelection[id] || (quoteSelection[id] = new Set());
  if (sel.has(i)) sel.delete(i); else sel.add(i);
  const el = document.querySelector(`#qlines-${id} [data-i="${i}"]`);
  if (el) el.classList.toggle("selected");
}

function quoteToggle(t) {
  if (!canEditQuote(t)) {
    if (t.is_quote) return '<div class="meta">🔖 Вся цитата</div>';
    if (t.quote_text) {
      const preview = t.quote_text.split("\n").join(" / ");
      return `<div class="meta">🔖 Цитата (${t.quote_text.split("\n").length} стр.): «${esc(preview.slice(0,40))}${preview.length>40?'…':''}»</div>`;
    }
    return "";
  }
  const fragmentNote = t.quote_text
    ? (() => { const preview = t.quote_text.split("\n").join(" / "); return `<div class="meta" style="margin-top:6px">🔖 Цитата (${t.quote_text.split("\n").length} стр.): «${esc(preview.slice(0,50))}${preview.length>50?'…':''}»
       <b onclick="doClearQuoteText(${t.id})" style="color:#c53030;cursor:pointer">✕ убрать</b></div>`; })()
    : "";
  return `<label style="display:flex;align-items:center;gap:6px;margin-top:8px;font-size:13px;color:var(--hint)">
    <input type="checkbox" style="width:auto;margin:0" ${t.is_quote ? "checked" : ""} onchange="doToggleQuote(${t.id})"> 🔖 Вся цитата целиком
  </label>${fragmentNote}`;
}

function taskCard(t) {
  let actions = "";
  if (t.can_approve) {
    actions = `
      <button class="act" onclick="doApprove(${t.id}, this)">✅ Одобрить</button>
      <button class="act sec" onclick="doRevise(${t.id})">✏️ Правки</button>
      <button class="act sec" onclick="doAlt(${t.id}, this)">🔄 Вариант</button>
      <button class="act danger" onclick="doCancel(${t.id})">❌ Отмена</button>`;
  } else if (t.can_generate) {
    actions = `<button class="act" onclick="doGenerate(${t.id}, this)">⚙️ Задать вопросы</button>
               <button class="act sec" onclick="doEdit(${t.id})">✎ Изменить</button>
               <button class="act danger" onclick="doDelete(${t.id})">🗑</button>`;
  }
  if (t.can_publish) {
    actions += `<button class="act" onclick="doPublishNow(${t.id})">📢 Опубликовать сейчас</button>`;
  }
  const body = postText(t);
  const meta = (t.can_generate && t.draft_date)
    ? `#${t.id} · ✍️ черновик ${fmtDate(t.draft_date)} ${t.draft_time||""} → 📢 публикация ${fmtDate(t.publish_date)} ${t.publish_time||""}`
    : `#${t.id} · 📢 ${fmtDate(t.publish_date)} ${t.publish_time||""}`;
  return `<div class="card">
    <div class="top"><div><div class="topic">${esc(t.topic) || "(без темы)"}</div>
      <div class="meta">${meta}</div></div></div>
    <div class="status">${esc(t.status_label)}</div>
    ${body}
    ${questionsBlock(t)}
    ${quoteToggle(t)}
    ${mediaChips(t)}
    <div class="actions">${actions}</div>
  </div>`;
}

let lastReady = [];
let hideSent = false;

function renderReady() {
  const shown = hideSent ? lastReady.filter(t => t.status !== "published") : lastReady;
  const toggle = lastReady.some(t => t.status === "published")
    ? `<button class="act sec" style="margin-bottom:10px" onclick="toggleHideSent()">${hideSent ? "👁 Показать отправленные" : "🙈 Скрыть отправленные"}</button>`
    : "";
  const list = shown.length ? shown.map(taskCard).join("") : '<div class="empty">Готовых постов нет</div>';
  document.getElementById("tab-ready").innerHTML =
    monthCalendar(shown) + toggle + '<div class="section-h">Список</div>' + list;
}
function toggleHideSent() { hideSent = !hideSent; renderReady(); }

async function loadTasks() {
  const data = await api("/tasks");
  const list = data.drafts.length ? data.drafts.map(taskCard).join("") : '<div class="empty">Черновиков нет</div>';
  document.getElementById("tab-drafts").innerHTML =
    monthCalendar(data.drafts, "draft_date") + '<div class="section-h">Список</div>' + list;
  lastReady = data.ready;
  renderReady();
}

function doApprove(id, btn){ run(btn, async () => { const res = await api(`/tasks/${id}/approve`,"POST"); toast(res.message||"Одобрено"); await loadTasks(); }); }
function doAlt(id, btn){ run(btn, async () => { await api(`/tasks/${id}/alternative`,"POST"); toast("Готовлю другой вариант…"); await loadTasks(); }); }
function doGenerate(id, btn){ run(btn, async () => { const res = await api(`/tasks/${id}/generate`,"POST"); toast(res.ok?"Готовлю вопросы…":"Не удалось (AI?)"); await loadTasks(); }); }
function doPublishNow(id){ tg.showConfirm("Опубликовать в канал сейчас?", async ok => { if(ok){ toast("Публикую…"); const res = await api(`/tasks/${id}/publish_now`,"POST"); toast(res.message||"Готово"); await loadTasks(); } }); }

function doSubmitAnswers(id, btn){
  run(btn, async () => {
    const card = btn.closest(".card");
    const answers = Array.from(card.querySelectorAll("textarea[data-qidx]")).map(el => el.value);
    toast("Генерирую черновик с учётом ответов…");
    await api(`/tasks/${id}/answers`, "POST", { answers });
    await loadTasks();
  });
}
function doSkipAnswers(id, btn){
  run(btn, async () => {
    toast("Генерирую черновик…");
    await api(`/tasks/${id}/skip_answers`, "POST");
    await loadTasks();
  });
}
async function doToggleQuote(id){ delete quoteSelection[id]; await api(`/tasks/${id}/quote`, "POST"); toast("Сохранено"); await loadTasks(); }

async function doMarkSelection(id){
  const sel = quoteSelection[id];
  if (!sel || !sel.size) { tg.showAlert("Сначала нажмите на строки, которые нужно выделить как цитату."); return; }
  const container = document.getElementById(`qlines-${id}`);
  const divs = [...container.children];
  const fragment = [...sel].sort((a, b) => a - b).map(i => divs[i].textContent).join("\n");
  await api(`/tasks/${id}/quote_text`, "POST", { quote_text: fragment });
  toast("Выделено как цитата ✓");
  await loadTasks();
}
async function doClearQuoteText(id){ delete quoteSelection[id]; await api(`/tasks/${id}/quote_text`, "POST", { quote_text: "" }); toast("Цитата снята"); await loadTasks(); }
function doCancel(id){ tg.showConfirm("Отменить задачу?", async ok => { if(ok){ await api(`/tasks/${id}/cancel`,"POST"); toast("Отменено"); await loadTasks(); } }); }
function doDelete(id){ tg.showConfirm("Удалить задачу?", async ok => { if(ok){ await api(`/tasks/${id}/delete`,"POST"); toast("Удалено"); await loadTasks(); } }); }

const MAX_UPLOAD_MB = 45;

async function uploadMedia(id, input){
  const file = input.files[0]; if(!file) return;
  const sizeMb = file.size / 1024 / 1024;
  if (sizeMb > MAX_UPLOAD_MB) {
    tg.showAlert(`Файл ${sizeMb.toFixed(1)} МБ — больше лимита в ${MAX_UPLOAD_MB} МБ. Выберите файл поменьше.`);
    input.value = "";
    return;
  }
  toast(`Загружаю ${sizeMb.toFixed(1)} МБ…`);
  const fd = new FormData(); fd.append("file", file);
  let res;
  try {
    res = await fetch(`/api/webapp/tasks/${id}/media`, {
      method: "POST", headers: { "X-Telegram-Init-Data": INIT }, body: fd });
  } catch (e) {
    tg.showAlert("Не удалось загрузить файл: обрыв соединения. Попробуйте ещё раз.");
    input.value = ""; return;
  }
  if(!res.ok){
    tg.showAlert(`Ошибка загрузки (код ${res.status}). Попробуйте файл поменьше или другой формат.`);
    input.value = ""; return;
  }
  const j = await res.json();
  if (!j.ok) { tg.showAlert(j.message || "Не удалось добавить медиа."); input.value = ""; return; }
  toast("Медиа добавлено ✓");
  input.value = "";
  await loadTasks();
}
async function delMedia(taskId, mediaId){ await api(`/tasks/${taskId}/media/${mediaId}/delete`,"POST"); toast("Удалено"); await loadTasks(); }

function doRevise(id){
  openModal("Что изменить?", '<textarea id="rev" rows="4" placeholder="Опишите правки"></textarea>',
    async () => { const c = document.getElementById("rev").value.trim();
      if(!c) return; toast("Готовлю новую версию…"); await api(`/tasks/${id}/revise`,"POST",{comment:c});
      await loadTasks(); });
}

async function doEdit(id){
  const t = await api(`/tasks/${id}`);
  const todayIso = new Date().toISOString().slice(0,10);
  const fromQuestions = t.status === "waiting_for_answers";
  openModal(fromQuestions ? "Изменить тему/цель поста" : "Изменить задачу", `
    <label>✍️ Дата подготовки черновика</label><input id="e-ddate" type="date" value="${t.draft_date || todayIso}">
    <label>Время подготовки</label><input id="e-dtime" type="time" value="${t.draft_time || '10:00'}">
    <label>📢 Дата публикации</label><input id="e-date" type="date" value="${t.publish_date}">
    <label>Время публикации</label><input id="e-time" type="time" value="${t.publish_time}">
    <label>Тема</label><input id="e-topic" value="${esc(t.topic)}">
    <label>Цель</label><input id="e-goal" value="${esc(t.goal)}">
    <label>Описание</label><textarea id="e-desc" rows="2">${esc(t.description)}</textarea>`,
    async () => {
      await api(`/tasks/${id}/edit`,"POST",{
        publish_date: document.getElementById("e-date").value,
        publish_time: document.getElementById("e-time").value,
        draft_date: document.getElementById("e-ddate").value,
        draft_time: document.getElementById("e-dtime").value,
        topic: document.getElementById("e-topic").value,
        goal: document.getElementById("e-goal").value,
        description: document.getElementById("e-desc").value,
      });
      if (fromQuestions) {
        toast("Сохранено — обновляю вопросы…");
        await api(`/tasks/${id}/generate`, "POST");
      } else {
        toast("Сохранено");
      }
      loadTasks();
    },
    fromQuestions ? { okLabel: "Сохранить и обновить вопросы", cancelLabel: "◀ Вернуться к вопросам" } : {});
}

document.getElementById("bulk-submit").onclick = async () => {
  const text = document.getElementById("bulk").value;
  if(!text.trim()) return;
  const res = await api("/tasks/bulk","POST",{text});
  let msg = "Создано: " + res.created;
  if(res.errors && res.errors.length) msg += "\nНе разобрано: " + res.errors.length;
  document.getElementById("bulk-result").textContent = msg;
  document.getElementById("bulk").value = "";
  loadTasks();
};

async function loadSettings() {
  const s = await api("/settings");
  document.getElementById("tab-settings").innerHTML = `
    <label>ID канала</label><input id="s-channel" value="${esc(s.channel_id)}">
    <label>Готовить черновик за (дней)</label><input id="s-lead" type="number" min="0" value="${esc(s.draft_lead_days)}">
    <label>Время публикации по умолчанию</label><input id="s-ptime" value="${esc(s.default_publish_time)}">
    <label>Время ежедневной проверки</label><input id="s-check" value="${esc(s.daily_check_time)}">
    <label>AI-провайдер</label><input id="s-prov" value="${esc(s.ai_provider)}">
    <label>AI-модель</label><input id="s-model" value="${esc(s.ai_model)}">
    <label>Системный промт</label><textarea id="s-prompt" rows="10">${esc(s.system_prompt)}</textarea>
    <button class="primary" id="s-save">Сохранить</button>
    <div class="section-h" style="margin-top:20px">👥 Администраторы</div>
    <div id="admins-list"></div>
    <label>Telegram ID нового админа</label><input id="a-id" type="number" placeholder="напр. 626493899">
    <label>Имя (необязательно)</label><input id="a-name" placeholder="Имя">
    <button class="primary" id="a-add">Добавить админа</button>`;
  document.getElementById("s-save").onclick = async () => {
    await api("/settings","POST",{
      channel_id: document.getElementById("s-channel").value,
      draft_lead_days: document.getElementById("s-lead").value,
      default_publish_time: document.getElementById("s-ptime").value,
      daily_check_time: document.getElementById("s-check").value,
      ai_provider: document.getElementById("s-prov").value,
      ai_model: document.getElementById("s-model").value,
      system_prompt: document.getElementById("s-prompt").value,
    });
    tg.showAlert("Сохранено");
  };
  document.getElementById("a-add").onclick = async () => {
    const id = parseInt(document.getElementById("a-id").value, 10);
    if (!id) { toast("Укажите Telegram ID"); return; }
    await api("/admins","POST",{ telegram_id: id, name: document.getElementById("a-name").value });
    document.getElementById("a-id").value = ""; document.getElementById("a-name").value = "";
    toast("Админ добавлен"); loadAdmins();
  };
  loadAdmins();
}

async function loadAdmins() {
  const data = await api("/admins");
  document.getElementById("admins-list").innerHTML = data.admins.map(a => `
    <div class="chip" style="justify-content:space-between;width:100%;margin-bottom:6px;border-radius:8px">
      <span>${a.role === "owner" ? "👑" : "🛡"} ${esc(a.name)} · <code>${a.telegram_id}</code></span>
      ${a.removable ? `<b onclick="delAdmin(${a.telegram_id})">Удалить</b>` : '<span style="color:var(--hint)">владелец</span>'}
    </div>`).join("");
}
async function delAdmin(id) {
  tg.showConfirm("Убрать доступ у этого админа?", async ok => {
    if (ok) { await api(`/admins/${id}/delete`,"POST"); toast("Удалён"); loadAdmins(); }
  });
}

// Обновление данных при возврате в приложение (webview держит страницу в фоне)
document.addEventListener("visibilitychange", () => { if (!document.hidden) loadTasks(); });
window.addEventListener("focus", loadTasks);
document.getElementById("refresh").onclick = () => { toast("Обновляю…"); loadTasks(); };
if (tg.onEvent) { try { tg.onEvent("activated", loadTasks); } catch (e) {} }

loadTasks();
</script>
</body>
</html>
