{% extends "base.html" %}
{% block title %}Настройки{% endblock %}
{% block content %}
<h1>Настройки</h1>
<div class="card">
    <form method="post" action="/admin/settings">
        <input type="hidden" name="_csrf" value="{{ request.state.csrf_token }}">
        <div class="row">
            <div>
                <label>Telegram ID владельца</label>
                <input type="text" name="owner_telegram_id" value="{{ data.owner_telegram_id }}">
            </div>
            <div>
                <label>ID закрытого канала</label>
                <input type="text" name="channel_id" value="{{ data.channel_id }}">
            </div>
        </div>
        <div class="row">
            <div>
                <label>Время ежедневной проверки (ЧЧ:ММ)</label>
                <input type="text" name="daily_check_time" value="{{ data.daily_check_time }}">
            </div>
            <div>
                <label>AI-провайдер</label>
                <input type="text" name="ai_provider" value="{{ data.ai_provider }}">
            </div>
            <div>
                <label>AI-модель</label>
                <input type="text" name="ai_model" value="{{ data.ai_model }}">
            </div>
        </div>
        <label>Системный промт бренда</label>
        <textarea name="system_prompt" style="min-height: 320px;">{{ data.system_prompt }}</textarea>
        <p style="color:#718096; font-size:13px;">API-ключи задаются только через <code>.env</code> и здесь не отображаются.</p>
        <p><button type="submit">Сохранить</button></p>
    </form>
</div>
{% endblock %}
